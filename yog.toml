[mod]
id          = "HexMod-Yog"
name        = "HexMod Yog"
version     = "0.1.0"
description = "Unofficial Rust port of Hex Casting (by gamma-delta / FallingColors) for the Yog Mod Loader."
authors     = ["F000NK", "Yog Team", "gamma-delta (original Hex Casting)", "FallingColors & HexMod contributors (original Hex Casting)"]
license     = "MIT"

# Points yog-api at the local monorepo crate.
# Real third-party mods omit this and get yog-api from crates.io.
[dependencies]
uuid = "1.23.3"
serde = "*"

## `yog run <name>` — build, drop the .yog into the loader's own Gradle dev-run
# instance, then launch it.
[run.forge-1.21.1]
name       = "Forge 1.21.1"
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/forge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.forge-1.20.1]
name       = "Forge 1.20.1"
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/forge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]

[run.fabric-1.21.1]
name       = "Fabric 1.21.1"
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.fabric-1.20.1]
name       = "Fabric 1.20.1"
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]

[run.neoforge-1.21.1]
name       = "NeoForge 1.21.1"
export_dir = "../Yog-Mod-Loader/neoforge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/neoforge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.neoforge-1.20.1]
name       = "NeoForge 1.20.1"
export_dir = "../Yog-Mod-Loader/neoforge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/neoforge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]